<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOSSA DATA ESPECIAL</title>
    <style>
        /* A LINHA QUE VOCÊ PROCURAVA ESTÁ AQUI EMBAIXO: */
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px 20px;
            border-radius: 30px;
            width: 85%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: #d81b60;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        p {
            font-size: 1.1rem;
            color: #ad1457;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .foto-casal {
            width: 100%;
            max-width: 280px;
            border-radius: 20px;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            margin-bottom: 30px;
        }

        .pergunta-caixa {
            background: rgba(255, 255, 255, 0.4);
            padding: 20px;
            border-radius: 20px;
            margin-top: 10px;
        }

        input[type="date"] {
            width: 80%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #f06292;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            outline: none;
            margin-bottom: 20px;
        }

        button {
            background: #d81b60;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.3);
            transition: 0.3s;
        }

        #coracao-gigante {
            display: none;
            font-size: 120px;
            color: #ff1744;
            margin: 20px 0;
            animation: pulsar 1.2s infinite;
        }

        @keyframes pulsar {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .sucesso-texto {
            display: none;
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: #d81b60;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Para o meu amor ❤️</h1>
        <p>Não vejo a hora de ter você todos os dias.</p>
        
        <img src="IMG_20250412_213335.jpg" alt="Nossa Foto" class="foto-casal">

        <div class="pergunta-caixa" id="caixa-pergunta">
            <p>Coloque a data que começamos a namorar:</p>
            <input type="date" id="dataInput">
            <br>
            <button onclick="verificarData()">Revelar Surpresa</button>
        </div>

        <div id="coracao-gigante">❤️</div>
        <div id="texto-sucesso" class="sucesso-texto">Acertou! Te amo mil milhões! 🌹</div>
    </div>

    <script>
        function verificarData() {
            const dataDigitada = document.getElementById('dataInput').value;
            const dataCerta = "2023-12-20"; // Sua data especial

            if (dataDigitada === dataCerta) {
                document.getElementById('caixa-pergunta').style.display = 'none';
                document.getElementById('coracao-gigante').style.display = 'block';
                document.getElementById('texto-sucesso').style.display = 'block';
            } else {
                alert("Essa não é a nossa data, amor! Tenta de novo... ❤️");
            }
        }
    </script>

</body>
</html>
